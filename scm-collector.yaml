    path: /infra/terraform/{environments,modules}/**/*.tf
    type: regex
    cache:
      duration:
        days: 1
    flags: i
    regex: source\s*=\s*"github\.com\/pagerduty\/terraform-aws-autoscaling-group(?:\.git)?(?:\/\/.*?)?\?ref=v(\d+?\.\d+?\.\d+?)"
    filter:
    - kind:
      - Component
      spec.type:
      - infra
      - library
      - service
      spec.lifecycle:
      - active
      - production
    factName: terraform-aws-autoscaling-group-version
    frequency:
      cron: 0 3 * * *
  - data:
    - name: version
      type: string
    path: /infra/terraform/{environments,modules}/**/*.tf
    type: regex
    cache:
      duration:
        days: 1
    flags: i
    regex: source\s*=\s*"github\.com\/pagerduty\/terraform-aws-cloudwatch-to-sumo(?:\.git)?(?:\/\/.*?)?\?ref=v(\d+?\.\d+?\.\d+?)"
    filter:
    - kind:
      - Component
      spec.type:
      - infra
      - library
      - service
      spec.lifecycle:
      - active
      - production
    factName: terraform-aws-cloudwatch-to-sumo-version
    frequency:
      cron: 0 9 * * *
  - data:
    - name: version
