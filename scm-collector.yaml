collects:
  - path: build.sbt
    type: regex
    cache:
      duration:
        days: 1
    regex: com\.typesafe\.akka
    filter:
    - kind:
      - Component
    factName: akka-dependency
    frequency:
      cron: 0 0 * * *
  - data:
    - name: deploy-pipeline-file
      path: .buildkite/prod-pipeline.yml
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: buildkite-deploy-exists-prod
    frequency:
      cron: 0 0 * * *
  - data:
    - name: deploy-pipeline-file
      path: .buildkite/stg-pipeline.yml
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: buildkite-deploy-exists-stg
    frequency:
      cron: 0 0 * * *
  - path: .buildkite/*
    type: regex
    cache:
      duration:
        days: 1
    flags: gi
    regex: PagerDuty\/docker(-login)?#
    filter:
    - kind:
      - Component
    factName: buildkite-docker-plugin
    frequency:
      cron: 0 0 * * *
  - path: .buildkite/*
    type: regex
    cache:
      duration:
        days: 1
    regex: npm (install|i)
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
    factName: check-npm-install-buildkite
    frequency:
      cron: 0 21 * * *
  - path: .circleci/config.yml
    type: regex
    cache:
      duration:
        days: 1
    flags: im
    regex: ^(?!.*(name|description):).*npm (install|i)
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
    factName: check-npm-install-circleci
    frequency:
      cron: 0 21 * * *
  - path: Dockerfile*
    type: regex
    cache:
      duration:
        days: 1
    regex: npm (install|i)
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
    factName: check-npm-install-dockerfile
    frequency:
      cron: 0 21 * * *
  - path: Makefile*
    type: regex
    cache:
      duration:
        days: 1
    regex: npm (install|i)
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
    factName: check-npm-install-makefile
    frequency:
      cron: 0 21 * * *
  - data:
    - name: mix-exs
      path: '**/mix.exs'
    - name: mix-lock
      path: '**/mix.lock'
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: elixir-files-exists
    frequency:
      days: 1
  - data:
    - name: major-version
      type: string
    - name: minor-version
      type: string
    path: /.tool-versions
    type: regex
    cache:
      duration:
        days: 1
    regex: .*elixir\s*([^\.]*)\.([^\.\n]*).*
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-elixir
    factName: elixir-version
    frequency:
      cron: 0 1 * * *
  - data:
    - name: major-version
      type: string
    - name: minor-version
      type: string
    path: /.tool-versions
    type: regex
    cache:
      duration:
        days: 1
    regex: .*erlang\s*([^\.]*)\.([^\.\n]*).*
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-elixir
    factName: erlang-version
    frequency:
      cron: 0 4 * * *
  - cache:
      duration:
        days: 1
    data:
    - jsonPath: $.*.canary
      name: canary-config
      type: object
    factName: euprod-euc1-helm-values
    filter:
    - kind:
      - Component
      spec.type:
      - service
    frequency:
      days: 1
    path: infra/kubernetes/*/values-euprod-euc1.yaml
    type: json
  - cache:
      duration:
        days: 1
    data:
    - items:
        type: string
      jsonPath: $.steps[*].plugins[*].*~
      name: plugins
      type: array
    - items:
        type: string
      jsonPath: $.steps[*].plugins[*].*.watchtower["name"]
      name: graduated-rollouts-watchtower-tests
      type: array
    factName: graduated-rollouts-pipeline
    filter:
    - kind:
      - Component
      spec.type:
      - service
    frequency:
      days: 1
    path: .buildkite/graduated-rollouts-pipeline.yml
    type: json
  - data:
    - name: jdk
      type: string
    - name: version
      type: string
    path: /.tool-versions
    type: regex
    cache:
      duration:
        days: 1
    regex: java (.*)-(.*)
    filter:
    - kind:
      - Component
    factName: java-version
    frequency:
      cron: 0 0 * * *
  - path: '**/.npmrc'
    type: regex
    cache: false
    regex: registry.npmjs.org
    filter:
    - kind:
      - Component
    factName: missing-cloudsmith-usage-npmrc
    frequency:
      cron: 0 0 31 2 *
  - path: '**/package-lock.json'
    type: regex
    cache: false
    regex: registry.npmjs.org
    filter:
    - kind:
      - Component
    factName: missing-cloudsmith-usage-package-lock
    frequency:
      cron: 0 0 31 2 *
  - path: '**/*.yml'
    type: regex
    cache: false
    regex: registry.npmjs.org
    filter:
    - kind:
      - Component
    factName: missing-cloudsmith-usage-yml-config
    frequency:
      cron: 0 0 31 2 *
  - data:
    - name: package-lock
      path: '**/package-lock.json'
    - name: package
      path: '**/package.json'
    - name: npmrc
      path: '**/.npmrc'
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: npm-files-exists
    frequency:
      days: 1
  - data:
    - name: dependencies
      type: array
      items:
        type: object
      jsonPath: $.dependencies
    path: /infra/kubernetes/**/Chart.yaml
    type: json
    cache:
      duration:
        days: 1
    filter:
    - kind:
      - Component
      spec.type:
      - service
    factName: pd-helm-chart-dependencies
    frequency:
      cron: 30 12 * * *
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: 'disable_validation: false'
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
      spec.lifecycle:
      - production
    factName: pi-gradle-circleci-enable-verification
    frequency:
      days: 1
  - path: build.gradle
    type: regex
    cache: false
    regex: https://dl.artifacts.pd-internal.com/basic/mvn-all/maven
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
      spec.lifecycle:
      - production
    factName: pi-gradle-cloudsmith-configured-build
    frequency:
      days: 1
  - path: settings.gradle
    type: regex
    cache: false
    regex: https://dl.artifacts.pd-internal.com/basic/mvn-all/maven
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
      spec.lifecycle:
      - production
    factName: pi-gradle-cloudsmith-configured-settings
    frequency:
      days: 1
  - path: gradle/verification-metadata.xml
    type: regex
    cache: false
    regex: <verify-signatures>true</verify-signatures>
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-java
      - java
      spec.lifecycle:
      - production
    factName: pi-gradle-package-verify-signatures
    frequency:
      days: 1
  - data:
    - name: verification-metadata
      path: gradle/verification-metadata.xml
    - name: verification-keyring
      path: gradle/verification-keyring.gpg
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: pi-gradle-verification-files-exist
    frequency:
      days: 1
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: command:\s*'CLOUDSMITH_USERNAME=\$\{CLOUDSMITH_RO_USER\}\s+CLOUDSMITH_API_KEY=\$\{CLOUDSMITH_RO_USER_API_KEY\}\s+mvn\s+compile'
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
    factName: pi-maven-compile-cloudsmith
    frequency:
      days: 1
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: command:\s*'CLOUDSMITH_USERNAME=\$\{CLOUDSMITH_RO_USER\}\s+CLOUDSMITH_API_KEY=\$\{CLOUDSMITH_RO_USER_API_KEY\}\s+mvn\s+dependency:resolve'
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
    factName: pi-maven-resolve-cloudsmith
    frequency:
      days: 1
  - path: conf/settings.xml
    type: regex
    cache: false
    regex: <server>[\s\S]*?<username>\$\{env\.CLOUDSMITH_USERNAME\}</username>[\s\S]*?<password>\$\{env\.CLOUDSMITH_API_KEY\}</password>[\s\S]*?<id>mvn-all</id>[\s\S]*?</server>
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
    factName: pi-maven-verify-cloudsmith-config
    frequency:
      days: 1
  - path: pom.xml
    type: regex
    cache: false
    regex: <plugin>[\s\S]*?<groupId>org\.simplify4u\.plugins</groupId>[\s\S]*?<artifactId>pgpverify-maven-plugin</artifactId>[\s\S]*?<version>1\.17\.0</version>[\s\S]*?<configuration>[\s\S]*?<keysMapLocation>\$\{project\.basedir\}/keysmap\.list</keysMapLocation>[\s\S]*?<pgpKeysCachePath>\$\{settings\.localRepository\}/pgpkeys-cache</pgpKeysCachePath>[\s\S]*?<verifyPlugins>true</verifyPlugins>[\s\S]*?<verifyAtypical>true</verifyAtypical>[\s\S]*?<verifySnapshots>true</verifySnapshots>[\s\S]*?</configuration>[\s\S]*?<executions>[\s\S]*?<execution>[\s\S]*?<goals>[\s\S]*?<goal>check</goal>[\s\S]*?</goals>[\s\S]*?</execution>[\s\S]*?</executions>[\s\S]*?</plugin>
    filter:
    - kind:
      - Component
      metadata.tags:
      - java
      - lang-java
    factName: pi-maven-verify-simplify4u
    frequency:
      days: 1
  - path: '**/mix.exs'
    type: regex
    cache: false
    regex: (github:\s*"PagerDuty/[^"]*"|git:\s*"git@github\.com:PagerDuty/[^"\.]*\.git")
    filter:
    - kind:
      - Component
      metadata.tags:
      - elixir
      - lang-elixir
      - pd-elixir-skeleton
      spec.lifecycle:
      - production
    factName: pi-mix-cloudsmith-not-used
    frequency:
      days: 1
  - path: .circleci/*.yml
    type: regex
    cache: false
    regex: elixir/verify_dependencies
    filter:
    - kind:
      - Component
      metadata.tags:
      - elixir
      - lang-elixir
      - pd-elixir-skeleton
      spec.lifecycle:
      - production
    factName: pi-mix-package-verify-signatures
    frequency:
      days: 1
  - path: .buildkite/prod-pipeline.yml
    type: regex
    cache: false
    regex: npm audit signatures
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
      spec.lifecycle:
      - production
      - experimental
    factName: pi-npm-package-verification-enabled-buildkite-prod
    frequency:
      cron: 0 0 * * *
  - path: .buildkite/stg-pipeline.yml
    type: regex
    cache: false
    regex: npm audit signatures
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
      spec.lifecycle:
      - experimental
      - production
    factName: pi-npm-package-verification-enabled-buildkite-stg
    frequency:
      cron: 0 0 * * *
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: npm audit signatures
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-javascript
      - lang-typescript
      spec.lifecycle:
      - experimental
      - production
    factName: pi-npm-package-verification-enabled-circleci
    frequency:
      cron: 0 0 * * *
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: --target verify-dependencies
    filter:
    - kind:
      - Component
    factName: pi-python-verify-integrity-circleci
    frequency:
      cron: 0 0 31 2 *
  - path: Dockerfile
    type: regex
    cache: false
    regex: poetry run python-integrity
    filter:
    - kind:
      - Component
    factName: pi-python-verify-integrity-dockerfile
    frequency:
      cron: 0 0 31 2 *
  - path: .circleci/config.yml
    type: regex
    cache: false
    flags: s
    regex: 'executors:.*?package_verification:'
    filter:
    - kind:
      - Component
      spec.type:
      - service
      metadata.tags:
      - lang-ruby
      spec.lifecycle:
      - production
    factName: pi-ruby-check-cloudsmith-config
    frequency:
      days: 1
  - path: .circleci/config.yml
    type: regex
    cache: false
    flags: s
    regex: ' verify_packages:.*?amazonaws\.com/package-integrity::'
    filter:
    - kind:
      - Component
      spec.type:
      - service
      metadata.tags:
      - lang-ruby
      spec.lifecycle:
      - production
    factName: pi-ruby-check-cloudsmith-config-uses-image
    frequency:
      days: 1
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: poetry --directory /app run ruby-integrity
    filter:
    - kind:
      - Component
      spec.type:
      - service
      metadata.tags:
      - lang-ruby
      spec.lifecycle:
      - production
    factName: pi-ruby-package-verify-signatures
    frequency:
      days: 1
  - path: project/plugins.sbt
    type: regex
    cache: false
    regex: addDependencyTreePlugin
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-scala
      spec.lifecycle:
      - production
    factName: pi-sbt-check-dependency-plugin
    frequency:
      days: 1
  - path: .circleci/config.yml
    type: regex
    cache: false
    regex: poetry run sbt-integrity
    filter:
    - kind:
      - Component
      metadata.tags:
      - lang-scala
      spec.lifecycle:
      - production
    factName: pi-sbt-package-verify-signatures
    frequency:
      days: 1
  - cache:
      duration:
        days: 1
    data:
    - jsonPath: $.*.canary
      name: canary-config
      type: object
    factName: prod-usw2-helm-values
    filter:
    - kind:
      - Component
      spec.type:
      - service
    frequency:
      days: 1
    path: infra/kubernetes/*/values-prod-usw2.yaml
    type: json
  - data:
    - name: enabledManagers
      type: array
      items:
        type: string
      jsonPath: $..enabledManagers
    - name: extends
      type: array
      items:
        type: string
      jsonPath: $..extends
    - name: osvVulnerabilityAlerts
      type: boolean
      jsonPath: $..osvVulnerabilityAlerts
    - name: vulnAlerts
      type: boolean
      jsonPath: $..vulnerabilityAlerts.enabled
    path: renovate.json
    type: json
    cache:
      duration:
        days: 1
    filter:
    - kind:
      - Component
    factName: renovate-config
    frequency:
      cron: 0 0 * * *
  - data:
    - name: readme
      path: README.md
    - name: catalog_info
      path: catalog-info.yaml
    - name: atlantis_config
      path: atlantis.yaml
    - name: renovate_config
      path: renovate.json
    - name: mix_config
      path: mix.exs
    - name: sbt_config
      path: build.sbt
    - name: gradle_config
      path: build.gradle
    - name: maven_config
      path: pom.xml
    type: exists
    cache:
      duration:
        days: 1
    filter:
    - kind:
      - Component
    factName: required_files_exist
    frequency:
      cron: 0 0 * * *
  - data:
    - name: gemfile
      path: '**/Gemfile'
    - name: gemfile-lock
      path: '**/Gemfile.lock'
    type: exists
    cache: false
    filter:
    - kind:
      - Component
    factName: ruby-files-exists
    frequency:
      days: 1
  - data:
    - name: mesh-enabled
      type: string
      jsonPath: $..mesh.enabled
    path: /infra/kubernetes/*/values.yaml
    type: json
    cache:
      duration:
        days: 1
    filter:
    - kind:
      - Component
      spec.type:
      - service
      spec.lifecycle:
      - production
    factName: service-mesh-enabled
    frequency:
      cron: 0 3 * * *
  - data:
    - name: snyk-check-type
      type: string
    path: .circleci/config.yml
    type: regex
    cache:
      duration:
        days: 1
    regex: 'snyk/snyk_(.*):'
    filter:
    - kind:
      - Component
      spec.type:
      - service
      - ui
      - library
    factName: synk-circleci-check
    frequency:
      cron: 0 0 * * *
  - path: .buildkite/prod-pipeline.yml
    type: regex
    cache:
      duration:
        days: 1
    regex: 'image: 748801462010.dkr.ecr.us-west-2.amazonaws.com/prodsec-testing-orchestrator:latest'
    filter:
    - kind:
      - Component
    factName: synk-prod-buildkite-check
    frequency:
      cron: 0 0 * * *
  - path: .buildkite/stg-pipeline.yml
    type: regex
    cache:
      duration:
        days: 1
    regex: 'image: 748801462010.dkr.ecr.us-west-2.amazonaws.com/prodsec-testing-orchestrator:latest'
    filter:
    - kind:
      - Component
      spec.type:
      - service
      - ui
