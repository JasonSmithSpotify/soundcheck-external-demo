    path: /infra/terraform/{environments,modules}/**/*.tf
    type: regex
    cache:
      duration:
        days: 1
    flags: i
    regex: source\s*=\s*"github\.com\/pagerduty\/terraform-aws-iam(?:\.git)?(?:\/\/.*?)?\?ref=v(\d+?\.\d+?\.\d+?)"
