  - data:
    - name: version
      type: string
    path: /infra/terraform/{environments,modules}/**/*.tf
    type: regex
    cache:
      duration:
        days: 1
    flags: i
    regex: source\s*=\s*"github\.com\/pagerduty\/terraform-aws-glue(?:\.git)?(?:\/\/.*?)?\?ref=v(\d+?\.\d+?\.\d+?)"
    filter:
    - kind:
